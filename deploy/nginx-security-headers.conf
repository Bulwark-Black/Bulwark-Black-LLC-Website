# Basic web-security headers for bulwarkblack.com.
# Included at the server level AND inside the static-asset location (which sets
# its own add_header and would otherwise not inherit these).

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
add_header Strict-Transport-Security "max-age=31536000" always;

# CSP: strict on active content (no plugins, self-only base/form/frame-ancestors,
# no external script/connect sources), permissive on passive content the CTI
# articles legitimately embed (external images/iframes over https). 'unsafe-inline'
# is required for Astro's inlined scripts, the font-swap onload handler, and the
# inline style= attributes in migrated WordPress content.
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self'; media-src 'self' https:; frame-src 'self' https:; manifest-src 'self'; upgrade-insecure-requests" always;
